<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>

  <!-- Google Fonts — two distinctive, complementary typefaces -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

  <!-- Our stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== Main wrapper keeps everything centered ===== -->
  <div class="container">

    <!-- Title -->
    <h1 class="title">Tic Tac Toe</h1>

    <!-- Status bar — shows whose turn it is, or the result -->
    <p id="status" class="status">Player <span class="x-color">X</span>'s turn</p>

    <!-- 3×3 game board -->
    <div id="board" class="board">
      <!-- Nine cells, each identified by a data-index -->
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <!-- Restart button -->
    <button id="restartBtn" class="restart-btn">Restart Game</button>
  </div>

  <!-- Our game logic -->
  <script src="script.js"></script>
</body>
</html>
